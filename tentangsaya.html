<html>
  <head>
    <title>TENTANG SAYA</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <center>
      <br>
      <h1>BORANG BIODATA PELAJAR</h1>
      <br>

      <!-- Jadual Utama Borang -->
      <table width="60%" border="1" cellpadding="10" style="border-collapse: collapse; background-color: #ffffff; border-color: #cccccc;">
        
        <!-- Header Borang -->
        <tr>
          <th colspan="2" style="background-color: #4CAF50; color: white; font-size: 18px; padding: 12px;">
            MAKLUMAT PERIBADI
          </th>
        </tr>

        <!-- Baris Nama -->
        <tr>
          <td width="30%" align="right"><b>Nama Penuh :</b></td>
          <td>
            <input type="text" value="Nur Syuhada Arissa Binti Mohd Hadzir" style="width: 100%; padding: 6px; font-size: 14px;" readonly>
          </td>
        </tr>

        <!-- Baris Program -->
        <tr>
          <td align="right"><b>Program / Kursus :</b></td>
          <td>
            <input type="text" value="1 Diploma Teknologi Komputeran" style="width: 100%; padding: 6px; font-size: 14px;" readonly>
          </td>
        </tr>

        <!-- Baris Status -->
        <tr>
          <td align="right"><b>Status Pengajian :</b></td>
          <td>
            <input type="text" value="Pelajar Aktif" style="width: 100%; padding: 6px; font-size: 14px;" readonly>
          </td>
        </tr>

        <!-- Baris Catatan/Sila Isi -->
        <tr>
          <td align="right"><b>E-mel (Pilihan) :</b></td>
          <td>
            <input type="email" placeholder="Masukkan e-mel anda di sini..." style="width: 100%; padding: 6px; font-size: 14px;">
          </td>
        </tr>

      </table>

      <br><br>
      <!-- Butang Kembali -->
      <a href="index.html"><button>KEMBALI KE UTAMA</button></a>
    </center>
  </body>
</html>
