<html>
  <head>
    <title>TENTANG SAYA</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <center>
      <br>
      <h1>BORANG MAKLUMAT PELAJAR</h1>
      <br>

      <form action="#" method="POST">
        
        <table width="65%" border="1" cellpadding="10" style="border-collapse: collapse; background-color: #ffffff; border-color: #bbbbbb;">
          
          <tr>
            <th colspan="2" style="background-color: #2196F3; color: white; font-size: 16px; padding: 10px;">
              SILA ISIKAN MAKLUMAT ANDA DI SINI
            </th>
          </tr>
          <tr>
            <td width="35%" align="right"><b>No. Matrik:</b></td>
            <td>
              <input type="text" name="no_matrik" placeholder="Contoh: DKA26XXXX" style="width: 100%; padding: 8px;" required>
            </td>
          </tr>
          <tr>
            <td align="right"><b>No. Telefon:</b></td>
            <td>
              <input type="text" name="no_tel" placeholder="Contoh: 0123456789" style="width: 100%; padding: 8px;" required>
            </td>
          </tr>
          <tr>
            <td align="right"><b>E-mel:</b></td>
            <td>
              <input type="email" name="emel" placeholder="Contoh: pelajar@email.com" style="width: 100%; padding: 8px;" required>
            </td>
          </tr>
          <tr>
            <td align="right"><b>Alamat Rumah:</b></td>
            <td>
              <textarea name="alamat" placeholder="Masukkan alamat penuh anda..." rows="3" style="width: 100%; padding: 8px; font-family: Arial, sans-serif;" required></textarea>
            </td>
          </tr>

          <tr>
            <td colspan="2" align="center" style="background-color: #f9f9f9; padding: 15px;">
              <input type="submit" value="HANTAR BORANG" style="background-color: #008CBA; color: white; padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;">
              &nbsp;&nbsp;
              <input type="reset" value="PADAM SEMULA" style="background-color: #f44336; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;">
            </td>
          </tr>

        </table>

      </form>
      <br><br>
      <a href="index.html"><button>KEMBALI KE UTAMA</button></a>
      <br><br>
    </center>
  </body>
</html>
